{% extends "base.html" %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Adicionar Produto ao Estoque</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('inserir_produto') }}" method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome do Produto *</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Teclado Mecânico RGB" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="preco" class="form-label">Preço de Venda (R$)</label>
                            <input type="number" step="0.01" class="form-control" id="preco" name="preco" placeholder="0.00" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="estoque" class="form-label">Quantidade Inicial</label>
                            <input type="number" class="form-control" id="estoque" name="estoque" placeholder="Ex: 50">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="descricao" class="form-label">Descrição (Opcional)</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="3"></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('listar_produtos') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Salvar Produto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
