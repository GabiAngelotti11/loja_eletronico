{% extends "base_publica.html" %}

{% block conteudo %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Criar Nova Conta</h3>
                
                <form action="{{ url_for('cadastro') }}" method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: João da Silva" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="nome@exemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" placeholder="Crie uma senha forte" required onkeyup="verificarForcaSenha()">
                        <div class="progress mt-2" style="height: 5px;">
                            <div id="barra-senha" class="progress-bar bg-danger" role="progressbar" style="width: 0%;"></div>
                        </div>
                        <small id="texto-senha" class="text-muted">A senha deve ter pelo menos 6 caracteres.</small>
                    </div>
                    <div class="mb-4">
                        <label for="confirma_senha" class="form-label">Confirmar Senha</label>
                        <input type="password" class="form-control" id="confirma_senha" name="confirma_senha" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Função exigida nos requisitos para interatividade extra
    function verificarForcaSenha() {
        var senha = document.getElementById('senha').value;
        var barra = document.getElementById('barra-senha');
        var texto = document.getElementById('texto-senha');
        
        if (senha.length === 0) {
            barra.style.width = '0%';
            texto.innerText = "A senha deve ter pelo menos 6 caracteres.";
        } else if (senha.length < 6) {
            barra.style.width = '33%';
            barra.className = 'progress-bar bg-danger';
            texto.innerText = "Senha fraca";
        } else if (senha.length >= 6 && senha.length < 10) {
            barra.style.width = '66%';
            barra.className = 'progress-bar bg-warning';
            texto.innerText = "Senha média";
        } else {
            barra.style.width = '100%';
            barra.className = 'progress-bar bg-success';
            texto.innerText = "Senha forte!";
        }
    }
</script>
{% endblock %}
