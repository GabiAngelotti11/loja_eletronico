{% extends "base_publica.html" %}

<!-- Conteúdo específico da página de login -->
{% block conteudo %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <!-- Título e formulário de autenticação (simulada) -->
                <h3 class="card-title text-center mb-4">Acesso ao Sistema</h3>
                
                <form action="{{ url_for('login') }}" method="POST">
                    <!-- Campo de e-mail -->
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="nome@exemplo.com" required>
                    </div>
                    <!-- Campo de senha -->
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" placeholder="Sua senha secreta" required>
                    </div>
                    <!-- Botão de submit -->
                    <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
                    <div class="text-center">
                        <!-- Link para cadastro -->
                        <small>Não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se aqui</a></small>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
