{% extends "base.html" %}

{% block conteudo %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Categorias do Sistema</h2>
    <a href="{{ url_for('inserir_categoria') }}" class="btn btn-primary">+ Nova Categoria</a>
</div>

<div class="tabela-container">
    <table class="table table-hover table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th class="text-center">Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for c in categorias %}
            <tr>
                <td>{{ c.id }}</td>
                <td class="fw-bold">{{ c.nome }}</td>
                <td>{{ c.descricao }}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-primary">Editar</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="return confirmarExclusao();">Excluir</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
