{% extends "base.html" %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Criar Categoria</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('inserir_categoria') }}" method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome da Categoria *</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Placas de Vídeo" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="descricao" class="form-label">Descrição Breve</label>
                        <input type="text" class="form-control" id="descricao" name="descricao" placeholder="Para que serve esta categoria?">
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('listar_categorias') }}" class="btn btn-secondary">Voltar</a>
                        <button type="submit" class="btn btn-dark">Criar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
